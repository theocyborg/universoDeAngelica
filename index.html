<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El universo de Angélica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
    font-family:'Playfair Display', 'Cormorant Garamond', Georgia, serif;
}
.universo{
    width:100%;
    height:100%;
    position:relative;
    background: #0a0a0f;
}
.nebulosa{
    position:absolute;
    width:70vw;
    height:50vh;
    top:25%;
    left:15%;
    background: radial-gradient( ellipse at 40% 50%, rgba(80, 70, 120, 0.06), transparent 70% ), radial-gradient( ellipse at 70% 60%, rgba(60, 80, 130, 0.04), transparent 60% );
    filter: blur(60px);
    mix-blend-mode: screen;
    opacity: 0.7;
    transform: rotate(-5deg);
}
.nebulosa-2{
    position:absolute;
    width:50vw;
    height:40vh;
    bottom:15%;
    right:10%;
    background: radial-gradient( ellipse at 50% 40%, rgba(100, 70, 130, 0.04), transparent 70% );
    filter: blur(80px);
    mix-blend-mode: screen;
    opacity: 0.5;
}
.estrella{
    position:absolute;
    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.4) 40%, transparent 80%);
    border-radius:50%;
    box-shadow: 0 0 6px 1px rgba(255,255,255,0.15);
    animation: parpadeo 6s infinite alternate ease-in-out;
    transition: opacity 2s ease;
}
.estrella-destello{
    position:absolute;
    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.5) 30%, transparent 70%);
    border-radius:50%;
    box-shadow: 0 0 10px 2px rgba(255,255,255,0.3);
    animation: parpadeo 7s infinite alternate ease-in-out;
    transition: opacity 2s ease;
}
.estrella-destello::after{
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 400%;
    height: 0.5px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
    transform: translate(-50%, -50%);
}
.estrella-destello::before{
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0.5px;
    height: 400%;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
    transform: translate(-50%, -50%);
}
@keyframes parpadeo{
    from{ opacity: 0.1; transform: scale(0.7); }
    to{ opacity: 1; transform: scale(1.3); }
}
.contenido{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    width:85%;
    animation:aparecer 5s ease;
    z-index: 10;
    text-shadow: 0 0 30px rgba(0,0,0,0.8);
}
h1{
    font-size:2.2rem;
    font-weight:500;
    font-style:italic;
    letter-spacing:2px;
    margin-bottom:25px;
    opacity: 0.95;
    text-shadow:
        0 0 15px rgba(255,255,255,0.5),
        0 0 30px rgba(255,105,180,0.55),
        0 0 55px rgba(255,20,147,0.35),
        0 0 30px rgba(0,0,0,0.8);
}
p{
    font-size:1.1rem;
    font-weight:400;
    line-height:1.7;
    opacity: 0.85;
    margin-bottom:40px;
    text-shadow:
        0 0 12px rgba(255,182,213,0.4),
        0 0 30px rgba(0,0,0,0.8);
}
button{
    padding:15px 35px;
    border-radius:30px;
    border:1px solid rgba(255,182,213,0.5);
    background:rgba(0,0,0,0.3);
    backdrop-filter: blur(2px);
    color:white;
    font-family:'Playfair Display', 'Cormorant Garamond', Georgia, serif;
    font-size:1rem;
    letter-spacing:1px;
    cursor: default;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(255,105,180,0.25);
}
button:hover{
    background: rgba(255,182,213,0.08);
    border-color: rgba(255,182,213,0.8);
    box-shadow: 0 0 30px rgba(255,105,180,0.45);
}
@keyframes aparecer{
    from{ opacity:0; transform: translate(-50%,-50%) scale(0.98); }
    to{ opacity:1; transform: translate(-50%,-50%) scale(1); }
}
.universo::after{
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(0.5px 0.5px at 15% 25%, rgba(255,255,255,0.02), transparent), radial-gradient(0.5px 0.5px at 45% 75%, rgba(255,255,255,0.015), transparent), radial-gradient(0.5px 0.5px at 75% 15%, rgba(255,255,255,0.02), transparent), radial-gradient(0.5px 0.5px at 90% 80%, rgba(255,255,255,0.01), transparent);
    pointer-events: none;
    z-index: 1;
    opacity: 0.3;
}
.universo::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(0.3px 0.3px at 20% 30%, rgba(255,255,255,0.015), transparent), radial-gradient(0.3px 0.3px at 60% 80%, rgba(255,255,255,0.01), transparent), radial-gradient(0.3px 0.3px at 80% 20%, rgba(255,255,255,0.02), transparent), radial-gradient(0.3px 0.3px at 40% 50%, rgba(255,255,255,0.012), transparent);
    pointer-events: none;
    z-index: 2;
    opacity: 0.4;
}
.universo.viaje {
    animation: acercarse 8s ease forwards;
}
.contenido.oculto {
    animation: desaparecer 2s ease forwards;
}
@keyframes desaparecer {
    from { opacity:1; }
    to { opacity:0; }
}
@keyframes acercarse {
    from { transform:scale(1); }
    to { transform:scale(1.15); }
}
.mensaje-universo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    text-align:center;
    color:white;
    font-family:'Playfair Display', 'Cormorant Garamond', Georgia, serif;
    font-style:italic;
    font-weight:400;
    font-size:1.4rem;
    line-height:1.8;
    opacity:0;
    z-index:20;
    text-shadow:
        0 0 15px rgba(255,255,255,0.5),
        0 0 35px rgba(255,105,180,0.6),
        0 0 65px rgba(255,20,147,0.35),
        0 0 25px rgba(0,0,0,0.9);
    transition: opacity 2s ease;
}
.mensaje-universo.visible {
    opacity:1;
}

/* =====================================
   ESCENA SCORPIUS Y PROFUNDIDAD CÓSMICA
===================================== */

.scorpio-container{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    z-index:8;
    transition:opacity 5s ease;
}

.scorpio-container.visible{
    opacity:1;
}

/* Estrellas principales de Scorpio */
.scorpio-star{
    position:absolute;
    width: 4.5px;
    height: 4.5px;
    border-radius:50%;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.4) 40%, transparent 80%);
    box-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 25px rgba(255,255,255,0.4);
}

/* Antares */
.scorpio-heart{
    width:10px;
    height:10px;
    background: radial-gradient(circle, #ffb28a 0%, rgba(255,120,80,0.5) 50%, transparent 80%);
    box-shadow:
    0 0 15px #ffb28a,
    0 0 35px rgba(255,120,80,0.8);
}

/* líneas sutiles de la constelación */
.scorpio-line{
    position:absolute;
    height:1px;
    background:rgba(255,255,255,0.25);
    transform-origin:left center;
}

/* Más profundidad del universo */
.polvo-cosmico{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(
    circle at 20% 30%,
    rgba(120,90,180,0.08),
    transparent 35%
    ),
    radial-gradient(
    circle at 80% 70%,
    rgba(80,120,200,0.06),
    transparent 40%
    );
    filter:blur(40px);
}
</style>
</head>
<body>
<div class="universo" id="universo">
    <div class="nebulosa"></div>
    <div class="nebulosa-2"></div>
    <div id="estrellas-container"></div>
    <div class="contenido">
        <p>Hay algo que quiero mostrarte...</p>
        <button id="comenzar">✨ Comenzar</button>
    </div>
    <div class="mensaje-universo" id="mensaje">
        El universo es tan grande,<br>
        tan antiguo y tan hermoso...
    </div>

    <div class="polvo-cosmico"></div>

    <!-- CONSTELACIÓN SCORPIUS -->
    <div class="scorpio-container" id="scorpio">
        <div class="scorpio-star" style="top:26%; left:48%;"></div>
        <div class="scorpio-star" style="top:28%; left:53%;"></div>
        <div class="scorpio-star" style="top:32%; left:57%;"></div>

        <div class="scorpio-star scorpio-heart" style="top:38%; left:55%;"></div>
        
        <div class="scorpio-star" style="top:44%; left:53%;"></div>
        <div class="scorpio-star" style="top:51%; left:50%;"></div>
        
        <div class="scorpio-star" style="top:58%; left:49%;"></div>
        <div class="scorpio-star" style="top:65%; left:51%;"></div>
        <div class="scorpio-star" style="top:71%; left:56%;"></div>
        
        <div class="scorpio-star" style="top:73%; left:63%;"></div>
        <div class="scorpio-star" style="top:70%; left:69%;"></div>
        <div class="scorpio-star" style="top:66%; left:71%; width:6px; height:6px; box-shadow: 0 0 15px #fff;"></div>
    </div>
</div>
<audio id="cancion" src="saturn-cut.mp3" preload="auto"></audio>

<script>
// ============================================
// SISTEMA DE ESTRELLAS DINÁMICO Y VIVO
// ============================================
const contenedor = document.getElementById('estrellas-container');
const NUM_ESTRELLAS_BASE = 200;
const ESTRELLAS_TOTALES = 350;

const colores = [
    'white',
    'rgba(200, 220, 255, 0.9)',
    'rgba(255, 240, 210, 0.8)',
    'rgba(220, 230, 255, 0.7)',
    'rgba(255, 230, 200, 0.7)'
];

let estrellas = [];

function crearEstrella(visible = true) {
    const estrella = document.createElement('div');
    const tamaño = (Math.random() * 3.2) + 0.3;
    const esDestello = tamaño > 2.5 && Math.random() > 0.8;
    
    if (esDestello) {
        estrella.className = 'estrella-destello';
        estrella.style.width = tamaño + 'px';
        estrella.style.height = tamaño + 'px';
    } else {
        estrella.className = 'estrella';
        estrella.style.width = tamaño + 'px';
        estrella.style.height = tamaño + 'px';
    }
    
    estrella.style.top = (Math.random() * 100) + '%';
    estrella.style.left = (Math.random() * 100) + '%';
    
    const colorIndex = Math.floor(Math.random() * colores.length);
    const col = colores[colorIndex];
    estrella.style.background = `radial-gradient(circle, ${col} 0%, rgba(255,255,255,0.3) 40%, transparent 80%)`;
    
    if (colores[colorIndex] !== 'white') {
        estrella.style.boxShadow = `0 0 ${tamaño * 2}px ${colores[colorIndex]}`;
    } else {
        estrella.style.boxShadow = `0 0 ${tamaño * 1.5}px rgba(255,255,255,0.3)`;
    }
    
    const duracion = (Math.random() * 3) + 2;
    const delay = Math.random() * 6;
    const opacidadMin = Math.random() * 0.15 + 0.05;
    const opacidadMax = Math.random() * 0.4 + 0.6;
    
    estrella.style.animationDuration = duracion + 's';
    estrella.style.animationDelay = delay + 's';
    
    const nombreAnimacion = `parpadeo-${Date.now()}-${Math.random()}`;
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
        @keyframes ${nombreAnimacion} {
            from { opacity: ${opacidadMin}; transform: scale(0.6); }
            to { opacity: ${opacidadMax}; transform: scale(1.4); }
        }
    `;
    document.head.appendChild(styleSheet);
    estrella.style.animationName = nombreAnimacion;
    
    if (!visible) {
        estrella.style.opacity = '0';
        estrella.style.animationPlayState = 'paused';
    }
    
    estrella.dataset.visible = visible;
    estrella.dataset.tamaño = tamaño;
    estrella.dataset.vida = 0;
    
    contenedor.appendChild(estrella);
    estrellas.push(estrella);
    return estrella;
}

function inicializarEstrellas() {
    for (let i = 0; i < ESTRELLAS_TOTALES; i++) {
        const visible = Math.random() > 0.3;
        crearEstrella(visible);
    }
}

function gestionarEstrellas() {
    const ahora = Date.now();
    estrellas.forEach((estrella, index) => {
        const probabilidadCambio = 0.003;
        if (Math.random() < probabilidadCambio) {
            const visible = estrella.dataset.visible === 'true';
            if (visible) {
                if (Math.random() > 0.4) {
                    estrella.style.opacity = '0';
                    estrella.style.animationPlayState = 'paused';
                    estrella.dataset.visible = 'false';
                    setTimeout(() => {
                        if (estrella.dataset.visible === 'false') {
                            estrella.style.top = (Math.random() * 100) + '%';
                            estrella.style.left = (Math.random() * 100) + '%';
                            const colorIndex = Math.floor(Math.random() * colores.length);
                            const col = colores[colorIndex];
                            estrella.style.background = `radial-gradient(circle, ${col} 0%, rgba(255,255,255,0.3) 40%, transparent 80%)`;
                            estrella.style.opacity = '1';
                            estrella.style.animationPlayState = 'running';
                            estrella.dataset.visible = 'true';
                        }
                    }, Math.random() * 4000 + 2000);
                }
            } else {
                if (Math.random() > 0.5) {
                    estrella.style.top = (Math.random() * 100) + '%';
                    estrella.style.left = (Math.random() * 100) + '%';
                    const colorIndex = Math.floor(Math.random() * colores.length);
                    const col = colores[colorIndex];
                    estrella.style.background = `radial-gradient(circle, ${col} 0%, rgba(255,255,255,0.3) 40%, transparent 80%)`;
                    estrella.style.opacity = '1';
                    estrella.style.animationPlayState = 'running';
                    estrella.dataset.visible = 'true';
                }
            }
        }
    });
}

window.onload = function() {
    inicializarEstrellas();
    setInterval(gestionarEstrellas, 2000);
    setInterval(() => {
        if (estrellas.length < 500) {
            const nueva = crearEstrella(true);
            setTimeout(() => {
                if (nueva.dataset.visible === 'true' && Math.random() > 0.5) {
                    nueva.style.opacity = '0';
                    nueva.style.animationPlayState = 'paused';
                    nueva.dataset.visible = 'false';
                }
            }, Math.random() * 8000 + 3000);
        }
    }, 5000);
};

// ============================================
// ACCIÓN DEL BOTÓN "COMENZAR VIAJE"
// ============================================
const boton = document.getElementById("comenzar");
const universo = document.getElementById("universo");
const contenido = document.querySelector(".contenido");

boton.addEventListener("click", () => {
    contenido.classList.add("oculto");
    universo.classList.add("viaje");
const cancion = document.getElementById("cancion");
cancion.volume = 0.6;
cancion.play();
    const mensaje = document.getElementById("mensaje");

    // Frase 1
    setTimeout(() => {
        mensaje.innerHTML = "El universo fue creado sólo<br>para ser visto con tus ojos";
        mensaje.classList.add("visible");
    }, 4000);

    setTimeout(() => {
        mensaje.classList.remove("visible");
    }, 9000);

    // Frase 2
    setTimeout(() => {
        mensaje.innerHTML = "porque tienes los ojitos<br>más hermosos del mundo";
        mensaje.classList.add("visible");
    }, 10000);

    setTimeout(() => {
        mensaje.classList.remove("visible");
    }, 15000);

    // Frase 3 — Scorpio ya visible en el paisaje
    setTimeout(() => {
        document.getElementById("scorpio").classList.add("visible");
        mensaje.innerHTML = "y porque tienes el mundo<br>más bonito en tus ojos";
        mensaje.classList.add("visible");
    }, 16000);

    setTimeout(() => {
        mensaje.classList.remove("visible");
    }, 22000);

    // Frase de cumpleaños
    setTimeout(() => {
        mensaje.innerHTML = "¡Felices 25 vueltas al sol!";
        mensaje.classList.add("visible");
    }, 25000);
});
</script>
</body>
</html>
